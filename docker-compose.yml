# ──────────────────────────────────────────────────────────────────────────────
# 7-Agent Price Intelligence Dashboard — Docker Compose
# Author: Lalit Nayyar <lalitnayyar@gmail.com>
# Usage:
#   Production:  docker compose up -d
#   Development: docker compose --profile dev up
#   With agents: docker compose --profile agents up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── React Dashboard (Production) ──────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_APP_TITLE: "${APP_TITLE:-7-Agent Price Intelligence Dashboard}"
        VITE_APP_ID: "agent-dashboard"
    image: agent-dashboard:${APP_VERSION:-latest}
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.agent-dashboard.service=frontend"
      - "com.agent-dashboard.version=${APP_VERSION:-1.0.0}"
    networks:
      - agent-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── React Dashboard (Development with HMR) ────────────────────────────────
  dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: agent-dashboard-dev:latest
    container_name: agent-dashboard-dev
    profiles: ["dev"]
    ports:
      - "${DEV_PORT:-5173}:5173"
    volumes:
      - ./client:/app/client:delegated
      - ./shared:/app/shared:delegated
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    networks:
      - agent-net

  # ── Nginx Reverse Proxy (optional, for multi-service setups) ──────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: agent-proxy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - agent-net

  # ── Python Agent Backend (optional, for real agent execution) ─────────────
  agent-backend:
    build:
      context: ./agent-backend
      dockerfile: Dockerfile.python
    image: agent-backend:latest
    container_name: agent-backend
    profiles: ["agents"]
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - agent-data:/app/data
      - agent-logs:/app/logs
      - ./products_vectorstore:/app/products_vectorstore:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Log Aggregator (optional) ─────────────────────────────────────────────
  log-viewer:
    image: amir20/dozzle:latest
    container_name: agent-log-viewer
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "${LOG_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
    networks:
      - agent-net

networks:
  agent-net:
    name: agent-network
    driver: bridge

volumes:
  agent-data:
    name: agent-dashboard-data
  agent-logs:
    name: agent-dashboard-logs
