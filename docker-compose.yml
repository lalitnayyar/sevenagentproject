# ──────────────────────────────────────────────────────────────────────────────
# 7-Agent Price Intelligence Dashboard — Docker Compose
# Author: Lalit Nayyar <lalitnayyar@gmail.com>
# Version: 1.0.1
#
# FIX v1.0.1:
#   - dashboard: healthcheck /health → / (SPA has no /health route)
#   - dashboard: build args expanded with VITE_ANALYTICS_* vars
#   - dashboard-dev: port 5173 → 3000 (matches Vite config port)
#   - dashboard-dev: full volume mounts added (server, patches, tsconfig, vite.config)
#   - agent-backend: context ./agent-backend → ./python-agents (correct folder name)
#   - agent-backend: added start_period: 15s to healthcheck
#
# Usage:
#   Production:   docker compose up -d
#   Development:  docker compose --profile dev up
#   With agents:  docker compose --profile agents up -d
#   Monitoring:   docker compose --profile monitoring up -d
#   Full stack:   docker compose --profile agents --profile monitoring up -d
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── React Dashboard (Production) ──────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_APP_TITLE: "${APP_TITLE:-7-Agent Price Intelligence Dashboard}"
        VITE_APP_ID: "agent-dashboard"
        VITE_ANALYTICS_ENDPOINT: "${VITE_ANALYTICS_ENDPOINT:-}"
        VITE_ANALYTICS_WEBSITE_ID: "${VITE_ANALYTICS_WEBSITE_ID:-}"
    image: agent-dashboard:${APP_VERSION:-latest}
    container_name: agent-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      # SPA serves index.html for all routes — /health does not exist
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.agent-dashboard.service=frontend"
      - "com.agent-dashboard.version=${APP_VERSION:-1.0.1}"
    networks:
      - agent-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── React Dashboard (Development with HMR) ────────────────────────────────
  dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: agent-dashboard-dev:latest
    container_name: agent-dashboard-dev
    profiles: ["dev"]
    ports:
      # Port 3000 matches Vite config (was incorrectly 5173 in v1.0.0)
      - "${DEV_PORT:-3000}:3000"
    volumes:
      # Mount source directories for live HMR — changes reflect instantly
      - ./client:/app/client:delegated
      - ./shared:/app/shared:delegated
      - ./server:/app/server:delegated
      - ./patches:/app/patches:delegated
      - ./vite.config.ts:/app/vite.config.ts:delegated
      - ./tsconfig.json:/app/tsconfig.json:delegated
      - ./tsconfig.node.json:/app/tsconfig.node.json:delegated
      # Anonymous volume prevents host node_modules from overwriting container's
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - TZ=${TZ:-UTC}
    networks:
      - agent-net

  # ── Nginx Reverse Proxy (optional, for multi-service setups) ──────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: agent-proxy
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      dashboard:
        condition: service_healthy
    networks:
      - agent-net

  # ── Python Agent Backend (optional, for real agent execution) ─────────────
  agent-backend:
    build:
      # context corrected: ./agent-backend → ./python-agents (actual folder name)
      context: ./python-agents
      dockerfile: Dockerfile.python
    image: agent-backend:latest
    container_name: agent-backend
    profiles: ["agents"]
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - agent-data:/app/data
      - agent-logs:/app/logs
      - ./python-agents/products_vectorstore:/app/products_vectorstore:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - agent-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # ── Log Viewer / Dozzle (optional monitoring) ─────────────────────────────
  log-viewer:
    image: amir20/dozzle:latest
    container_name: agent-log-viewer
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "${LOG_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
    networks:
      - agent-net

networks:
  agent-net:
    name: agent-network
    driver: bridge

volumes:
  agent-data:
    name: agent-dashboard-data
  agent-logs:
    name: agent-dashboard-logs
